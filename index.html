<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ATLASWAY TRADING LIMITED — Global Physical Trading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: {
              900: '#06101F',
              800: '#0A1628',
              700: '#0F1D34',
              600: '#152844',
              500: '#1F3556',
            },
            paper: {
              50: '#F8F6F1',
              100: '#F2EFE8',
              200: '#E8E4DA',
              300: '#D6D1C4',
            },
            gold: {
              300: '#E0C589',
              400: '#D2B36F',
              500: '#C9A961',
              600: '#A98843',
              700: '#83682E',
            },
            slate2: {
              400: '#7B8AA1',
              500: '#5C6B82',
              600: '#3F4D63',
            }
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            mono: ['JetBrains Mono', 'ui-monospace'],
            display: ['Fraunces', 'Inter', 'serif']
          }
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #F8F6F1; color: #0A1628; }
    .grain {
      background-image: radial-gradient(rgba(10,22,40,0.025) 1px, transparent 1px);
      background-size: 3px 3px;
    }
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 1s cubic-bezier(.2,.6,.2,1), transform 1s cubic-bezier(.2,.6,.2,1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: .08s; }
    .reveal-delay-2 { transition-delay: .16s; }
    .reveal-delay-3 { transition-delay: .24s; }
    .reveal-delay-4 { transition-delay: .32s; }
    .hairline { background: linear-gradient(90deg, transparent, rgba(10,22,40,0.18), transparent); }
    .hairline-light { background: linear-gradient(90deg, transparent, rgba(245,243,238,0.25), transparent); }
    .num-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; }
    .display { font-family: 'Fraunces', serif; font-weight: 300; letter-spacing: -0.02em; line-height: 1.02; }
    .marquee {
      animation: marquee 60s linear infinite;
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .route-dash {
      stroke-dasharray: 4 6;
      animation: dash 30s linear infinite;
    }
    @keyframes dash { to { stroke-dashoffset: -200; } }
    .pulse-dot {
      animation: pulse-dot 2.4s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: .35; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }
    .ticker-row { mask-image: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent); }
    .gold-underline { position: relative; }
    .gold-underline::after {
      content: ''; position: absolute; left: 0; bottom: -4px; width: 28px; height: 2px; background: #C9A961;
    }
    /* selection */
    ::selection { background: #C9A961; color: #0A1628; }
    /* form */
    input, textarea {
      background: transparent !important;
      border: 0 !important;
      border-bottom: 1px solid rgba(10,22,40,0.18) !important;
      border-radius: 0 !important;
      padding: 14px 0 !important;
      box-shadow: none !important;
      font-size: 15px !important;
      color: #0A1628 !important;
      transition: border-color .3s ease;
    }
    input:focus, textarea:focus {
      outline: none !important;
      border-bottom-color: #C9A961 !important;
    }
    input::placeholder, textarea::placeholder { color: rgba(10,22,40,0.4) !important; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 12px;
      background: #0A1628; color: #F8F6F1;
      padding: 14px 22px; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase;
      transition: background .25s ease, transform .25s ease;
      border: 1px solid #0A1628;
    }
    .btn-primary:hover { background: #C9A961; border-color: #C9A961; color: #0A1628; }
    .btn-primary .arr { transition: transform .3s ease; }
    .btn-primary:hover .arr { transform: translateX(4px); }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 10px;
      color: inherit; padding: 12px 0; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
      border-bottom: 1px solid currentColor;
      transition: gap .25s ease, color .25s ease;
    }
    .btn-ghost:hover { gap: 16px; color: #C9A961; }
    .nav-link { position: relative; }
    .nav-link::after {
      content:''; position:absolute; left:0; bottom:-4px; width:0; height:1px; background:#C9A961; transition: width .3s ease;
    }
    .nav-link:hover::after { width: 100%; }
    .card-hover { transition: transform .5s cubic-bezier(.2,.6,.2,1), border-color .5s ease, background .5s ease; }
    .card-hover:hover { transform: translateY(-3px); }
    .scroll-indicator {
      animation: scrolldown 2.4s cubic-bezier(.6,.05,.4,1) infinite;
    }
    @keyframes scrolldown {
      0% { transform: translateY(0); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: translateY(28px); opacity: 0; }
    }
    .market-tag {
      transition: background .25s ease, color .25s ease, border-color .25s ease;
    }
    .market-tag:hover {
      background: #0A1628; color: #F8F6F1; border-color: #0A1628;
    }
    .market-tag .dot { transition: background .25s ease; }
    .market-tag:hover .dot { background: #C9A961; }
    /* image plate effect */
    .plate {
      filter: contrast(1.05) saturate(0.85);
    }
    /* custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F2EFE8; }
    ::-webkit-scrollbar-thumb { background: #C9A961; border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: #A98843; }
    * { scrollbar-width: thin; scrollbar-color: #C9A961 #F2EFE8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel pinned -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react">
// Custom monochrome SVG illustrations toned to the brand palette.
// Three plates: PortGrain, ContainerStack, OilField — flat editorial style,
// navy + gold + paper. Drawn from scratch (no stock photos).

const PortGrain = ({ className = "" }) => (
  <svg viewBox="0 0 800 520" className={className} preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <linearGradient id="pg-sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#152844"/>
        <stop offset="55%" stopColor="#1F3556"/>
        <stop offset="100%" stopColor="#3a4a66"/>
      </linearGradient>
      <linearGradient id="pg-water" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#0F1D34"/>
        <stop offset="100%" stopColor="#06101F"/>
      </linearGradient>
      <linearGradient id="pg-grain" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#E0C589"/>
        <stop offset="100%" stopColor="#A98843"/>
      </linearGradient>
      <pattern id="pg-noise" width="3" height="3" patternUnits="userSpaceOnUse">
        <circle cx="1" cy="1" r="0.5" fill="#06101F" opacity="0.08"/>
      </pattern>
    </defs>
    {/* sky */}
    <rect width="800" height="320" fill="url(#pg-sky)"/>
    {/* faint horizon clouds */}
    <path d="M0,180 Q150,160 300,175 T600,170 T800,178 L800,200 L0,200 Z" fill="#F8F6F1" opacity="0.04"/>
    <path d="M0,140 Q200,125 400,138 T800,135 L800,155 L0,155 Z" fill="#F8F6F1" opacity="0.03"/>
    {/* distant skyline */}
    <g opacity="0.45" fill="#06101F">
      <rect x="40" y="245" width="2" height="40"/>
      <rect x="45" y="260" width="20" height="25"/>
      <rect x="70" y="250" width="3" height="35"/>
      <rect x="78" y="265" width="40" height="20"/>
      <rect x="125" y="240" width="2" height="45"/>
      <polygon points="130,255 140,240 150,255 150,285 130,285"/>
      <rect x="160" y="258" width="60" height="27"/>
      <rect x="225" y="250" width="2" height="35"/>
      <rect x="230" y="262" width="50" height="23"/>
      <rect x="285" y="245" width="3" height="40"/>
      <rect x="295" y="260" width="35" height="25"/>
      <rect x="335" y="255" width="80" height="30"/>
      <rect x="420" y="248" width="2" height="37"/>
      <rect x="425" y="258" width="55" height="27"/>
      <rect x="485" y="252" width="40" height="33"/>
      <rect x="530" y="248" width="2" height="37"/>
      <rect x="538" y="262" width="60" height="23"/>
      <rect x="605" y="255" width="45" height="30"/>
      <rect x="655" y="250" width="2" height="35"/>
      <rect x="662" y="262" width="50" height="23"/>
      <rect x="720" y="258" width="60" height="27"/>
    </g>
    {/* water */}
    <rect y="285" width="800" height="120" fill="url(#pg-water)"/>
    <g stroke="#5C6B82" strokeWidth="0.6" opacity="0.35">
      <path d="M0,310 Q100,308 200,310 T400,310 T600,310 T800,310" fill="none"/>
      <path d="M0,328 Q120,326 240,328 T480,328 T720,328" fill="none"/>
      <path d="M0,348 Q150,346 300,348 T600,348 T800,348" fill="none"/>
      <path d="M0,372 Q100,370 200,372 T400,372 T600,372 T800,372" fill="none"/>
    </g>
    {/* ship hull */}
    <g>
      <path d="M120,335 L660,335 L640,378 L150,378 Z" fill="#06101F"/>
      <rect x="120" y="328" width="540" height="8" fill="#83682E"/>
      <rect x="130" y="338" width="520" height="3" fill="#C9A961" opacity="0.4"/>
      {/* superstructure */}
      <rect x="540" y="285" width="110" height="50" fill="#F2EFE8"/>
      <rect x="540" y="285" width="110" height="6" fill="#C9A961"/>
      <rect x="555" y="298" width="14" height="14" fill="#152844"/>
      <rect x="575" y="298" width="14" height="14" fill="#152844"/>
      <rect x="595" y="298" width="14" height="14" fill="#152844"/>
      <rect x="615" y="298" width="14" height="14" fill="#152844"/>
      <rect x="555" y="318" width="80" height="8" fill="#152844" opacity="0.6"/>
      {/* deck */}
      <rect x="160" y="320" width="370" height="15" fill="#1F3556"/>
      <rect x="160" y="318" width="370" height="3" fill="#3F4D63"/>
    </g>
    {/* cranes — 3 of them */}
    {[180, 290, 400].map((x, i) => (
      <g key={i} stroke="#C9A961" strokeWidth="2" fill="none">
        <line x1={x} y1="320" x2={x} y2="180"/>
        <line x1={x-3} y1="180" x2={x-3} y2="320"/>
        <line x1={x+3} y1="180" x2={x+3} y2="320"/>
        <line x1={x-8} y1="200" x2={x+90} y2="170"/>
        <line x1={x-8} y1="195" x2={x+90} y2="165"/>
        <line x1={x-8} y1="200" x2={x+90} y2="165"/>
        <line x1={x+85} y1="167" x2={x+85} y2="240"/>
        <circle cx={x+85} cy="240" r="3" fill="#C9A961"/>
        {/* lattice */}
        <line x1={x-3} y1="200" x2={x+3} y2="220"/>
        <line x1={x+3} y1="200" x2={x-3} y2="220"/>
        <line x1={x-3} y1="240" x2={x+3} y2="260"/>
        <line x1={x+3} y1="240" x2={x-3} y2="260"/>
        <line x1={x-3} y1="280" x2={x+3} y2="300"/>
        <line x1={x+3} y1="280" x2={x-3} y2="300"/>
      </g>
    ))}
    {/* rear mast */}
    <g stroke="#C9A961" strokeWidth="1.5" fill="none">
      <line x1="600" y1="285" x2="600" y2="200"/>
      <line x1="595" y1="240" x2="605" y2="240"/>
      <line x1="595" y1="220" x2="605" y2="220"/>
    </g>
    {/* dock */}
    <rect y="378" width="800" height="45" fill="#D6D1C4"/>
    <rect y="378" width="800" height="2" fill="#83682E" opacity="0.5"/>
    {/* containers on dock */}
    <g>
      <rect x="20" y="395" width="42" height="18" fill="#83682E"/>
      <rect x="20" y="395" width="42" height="2" fill="#C9A961"/>
      <rect x="65" y="395" width="42" height="18" fill="#1F3556"/>
      <rect x="65" y="395" width="42" height="2" fill="#3F4D63"/>
      <rect x="20" y="378" width="42" height="17" fill="#152844"/>
      <rect x="65" y="378" width="42" height="17" fill="#83682E"/>
      <rect x="113" y="395" width="55" height="18" fill="#3F4D63"/>
      {/* trucks */}
      <rect x="200" y="400" width="60" height="14" fill="#F2EFE8"/>
      <rect x="200" y="395" width="20" height="19" fill="#1F3556"/>
      <rect x="320" y="400" width="55" height="14" fill="#E0C589"/>
      <rect x="320" y="395" width="18" height="19" fill="#1F3556"/>
    </g>
    {/* grain piles — golden hero element */}
    <g>
      <path d="M380,520 L520,395 L660,520 Z" fill="url(#pg-grain)"/>
      <path d="M380,520 L520,395 L520,520 Z" fill="#83682E" opacity="0.4"/>
      <path d="M540,520 L680,420 L800,520 Z" fill="url(#pg-grain)"/>
      <path d="M540,520 L680,420 L680,520 Z" fill="#83682E" opacity="0.35"/>
      <path d="M250,520 L380,440 L500,520 Z" fill="url(#pg-grain)" opacity="0.92"/>
      <path d="M250,520 L380,440 L380,520 Z" fill="#83682E" opacity="0.4"/>
      {/* texture lines */}
      <path d="M380,520 L520,395" stroke="#83682E" strokeWidth="1" opacity="0.5" fill="none"/>
      <path d="M540,520 L680,420" stroke="#83682E" strokeWidth="1" opacity="0.5" fill="none"/>
      <path d="M250,520 L380,440" stroke="#83682E" strokeWidth="1" opacity="0.5" fill="none"/>
    </g>
    <rect width="800" height="520" fill="url(#pg-noise)"/>
  </svg>
);

const ContainerStack = ({ className = "" }) => (
  <svg viewBox="0 0 800 520" className={className} preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <linearGradient id="cs-sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#0F1D34"/>
        <stop offset="100%" stopColor="#3a4a66"/>
      </linearGradient>
      <pattern id="cs-noise" width="3" height="3" patternUnits="userSpaceOnUse">
        <circle cx="1" cy="1" r="0.5" fill="#06101F" opacity="0.08"/>
      </pattern>
    </defs>
    <rect width="800" height="520" fill="url(#cs-sky)"/>
    {/* horizon glow */}
    <ellipse cx="400" cy="380" rx="500" ry="80" fill="#C9A961" opacity="0.12"/>
    {/* ground */}
    <rect y="430" width="800" height="90" fill="#06101F"/>
    <line x1="0" y1="430" x2="800" y2="430" stroke="#C9A961" strokeWidth="1" opacity="0.3"/>
    {/* container stack — built procedurally */}
    {(() => {
      const palette = ['#83682E', '#1F3556', '#C9A961', '#152844', '#3F4D63', '#A98843'];
      const rows = [];
      // back row
      const containers = [];
      let key = 0;
      for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 12; col++) {
          const x = 40 + col * 60;
          const y = 410 - row * 42;
          const c = palette[(row * 3 + col * 7) % palette.length];
          const opacity = 0.65 + (row * 0.06);
          containers.push(
            <g key={key++} opacity={opacity}>
              <rect x={x} y={y} width="56" height="38" fill={c}/>
              <rect x={x} y={y} width="56" height="2" fill="#06101F" opacity="0.5"/>
              <rect x={x} y={y+36} width="56" height="2" fill="#06101F" opacity="0.5"/>
              {/* ridges */}
              {[...Array(8)].map((_, k) => (
                <line key={k} x1={x+4+k*7} y1={y+4} x2={x+4+k*7} y2={y+34} stroke="#06101F" strokeOpacity="0.18" strokeWidth="1"/>
              ))}
              {/* door */}
              <rect x={x+50} y={y+4} width="4" height="30" fill="#06101F" opacity="0.4"/>
            </g>
          );
        }
      }
      return containers;
    })()}
    {/* foreground larger containers */}
    {(() => {
      const palette = ['#C9A961', '#152844', '#83682E', '#1F3556', '#A98843'];
      const out = [];
      let key = 100;
      for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 7; col++) {
          const x = 60 + col * 110;
          const y = 420 - row * 70;
          const c = palette[(row + col * 2) % palette.length];
          out.push(
            <g key={key++}>
              <rect x={x} y={y} width="100" height="64" fill={c}/>
              <rect x={x} y={y} width="100" height="3" fill="#06101F" opacity="0.55"/>
              <rect x={x} y={y+61} width="100" height="3" fill="#06101F" opacity="0.55"/>
              {[...Array(14)].map((_, k) => (
                <line key={k} x1={x+5+k*7} y1={y+5} x2={x+5+k*7} y2={y+59} stroke="#06101F" strokeOpacity="0.22" strokeWidth="1"/>
              ))}
              <rect x={x+90} y={y+5} width="6" height="54" fill="#06101F" opacity="0.5"/>
              <rect x={x+85} y={y+30} width="3" height="3" fill="#F8F6F1" opacity="0.4"/>
            </g>
          );
        }
      }
      return out;
    })()}
    {/* reach stacker silhouette */}
    <g fill="#06101F" opacity="0.85">
      <rect x="610" y="370" width="80" height="40"/>
      <rect x="600" y="385" width="100" height="25"/>
      <circle cx="620" cy="425" r="18"/>
      <circle cx="680" cy="425" r="18"/>
      <circle cx="620" cy="425" r="9" fill="#3F4D63"/>
      <circle cx="680" cy="425" r="9" fill="#3F4D63"/>
      {/* boom */}
      <path d="M650,375 L750,260 L760,265 L660,380 Z"/>
      <path d="M748,255 L760,265" stroke="#C9A961" strokeWidth="2"/>
      <rect x="745" y="252" width="20" height="14" fill="#152844"/>
    </g>
    <rect width="800" height="520" fill="url(#cs-noise)"/>
  </svg>
);

const OilField = ({ className = "" }) => (
  <svg viewBox="0 0 800 520" className={className} preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <linearGradient id="of-sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#83682E"/>
        <stop offset="40%" stopColor="#A98843"/>
        <stop offset="80%" stopColor="#C9A961"/>
        <stop offset="100%" stopColor="#E0C589"/>
      </linearGradient>
      <linearGradient id="of-darksky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#0A1628"/>
        <stop offset="60%" stopColor="#1F3556"/>
        <stop offset="100%" stopColor="#83682E"/>
      </linearGradient>
      <pattern id="of-noise" width="3" height="3" patternUnits="userSpaceOnUse">
        <circle cx="1" cy="1" r="0.5" fill="#06101F" opacity="0.08"/>
      </pattern>
    </defs>
    {/* Use a navy-toned sky to fit brand instead of literal orange */}
    <rect width="800" height="520" fill="url(#of-darksky)"/>
    {/* sun glow */}
    <circle cx="600" cy="380" r="160" fill="#C9A961" opacity="0.35"/>
    <circle cx="600" cy="380" r="90" fill="#E0C589" opacity="0.45"/>
    <circle cx="600" cy="380" r="50" fill="#F8F6F1" opacity="0.3"/>
    {/* horizon line */}
    <rect y="445" width="800" height="75" fill="#06101F"/>
    <line x1="0" y1="445" x2="800" y2="445" stroke="#C9A961" strokeWidth="1" opacity="0.4"/>

    {/* derrick towers in background */}
    {[
      { x: 60, h: 130, scale: 0.7 },
      { x: 130, h: 150, scale: 0.85 },
      { x: 190, h: 110, scale: 0.6 },
      { x: 250, h: 140, scale: 0.78 },
      { x: 700, h: 135, scale: 0.75 },
      { x: 750, h: 120, scale: 0.65 },
    ].map((d, i) => {
      const baseY = 445;
      const topY = baseY - d.h;
      const bw = 32 * d.scale;
      return (
        <g key={i} stroke="#06101F" strokeWidth="1.2" fill="none" opacity="0.85">
          <line x1={d.x - bw} y1={baseY} x2={d.x} y2={topY}/>
          <line x1={d.x + bw} y1={baseY} x2={d.x} y2={topY}/>
          <line x1={d.x - bw*0.6} y1={baseY} x2={d.x - bw*0.6} y2={topY + 20}/>

// Reveal-on-scroll hook
const useReveal = () => {
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  });
};

// helper: scatter dots inside a polygon's bounding region
function generateDots(points, r, count) {
  const xs = points.map(p => p[0]);
  const ys = points.map(p => p[1]);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const dots = [];
  let seed = points.reduce((a, p) => a + p[0] + p[1], 0);
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  for (let i = 0; i < count; i++) {
    const x = minX + rand() * (maxX - minX);
    const y = minY + rand() * (maxY - minY);
    if (pointInPoly(x, y, points)) {
      dots.push(<circle key={i} cx={x} cy={y} r={r * (0.5 + rand()*0.6)}/>);
    }
  }
  return dots;
}
function pointInPoly(x, y, vs) {
  let inside = false;
  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    const xi = vs[i][0], yi = vs[i][1];
    const xj = vs[j][0], yj = vs[j][1];
    const intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

        </div>
        <div className="flex items-center gap-3 shrink-0">
          <button onClick={decline}
            className="text-[12px] tracking-[0.1em] uppercase text-paper-100/50 hover:text-paper-100/80 transition px-4 py-2.5"
            style={{border:'1px solid rgba(248,246,241,0.12)'}}>
            Decline
          </button>
          <button onClick={accept}
            className="text-[12px] tracking-[0.1em] uppercase transition px-5 py-2.5"
            style={{background:'#C9A961', color:'#06101F', border:'1px solid #C9A961'}}
            onMouseEnter={e=>{e.currentTarget.style.background='#A98843';e.currentTarget.style.borderColor='#A98843';}}
            onMouseLeave={e=>{e.currentTarget.style.background='#C9A961';e.currentTarget.style.borderColor='#C9A961';}}>
            Accept
          </button>
        </div>
      </div>
    </div>
  );
};

const App = () => {
  window.useReveal();
  const [modal, setModal] = React.useState(null); // 'terms' | 'privacy' | 'cookies' | null
  return (
    <div className="min-h-screen">
      <window.Header/>
      <main>
        <window.Hero/>
        <window.About/>
        <window.Services/>
        <window.HowItWorks/>
        <window.Markets/>
        <window.Compliance/>
        <window.Contact/>
      </main>
      <window.Footer onOpenModal={setModal}/>
      <CookieBanner onShowCookiePolicy={() => setModal('cookies')}/>
      {modal && <LegalModal type={modal} onClose={() => setModal(null)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
